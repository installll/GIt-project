<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 贪吃蛇 · 20关</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{overflow:hidden;touch-action:none;font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block;border-radius:8px}
.lv-btn{transition:all .15s}
.lv-btn:hover{transform:translateY(-2px)}
.lv-btn:active{transform:scale(.95)}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg)}70%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
.star-pop{animation:starPop .4s ease-out}
</style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col items-center justify-center select-none">

<!-- ========== 游戏界面 ========== -->
<div id="gameUI" class="hidden flex flex-col items-center w-full">
  <!-- 信息栏 -->
  <div class="flex items-center gap-5 mb-2">
    <div class="text-center"><p class="text-gray-500 text-[10px] uppercase">关卡</p>
      <p id="lvBadge" class="text-2xl font-black text-cyan-400">1</p></div>
    <div class="text-center"><p class="text-gray-500 text-[10px] uppercase">得分</p>
      <p id="score" class="text-3xl font-bold text-emerald-400 tabular-nums">0</p></div>
    <div class="text-center"><p class="text-gray-500 text-[10px] uppercase">目标</p>
      <p id="target" class="text-xl font-bold text-yellow-400">/5</p></div>
    <div class="text-center"><p class="text-gray-500 text-[10px] uppercase">最佳</p>
      <p id="best" class="text-xl font-bold text-gray-500">-</p></div>
  </div>
  <!-- 进度条 -->
  <div class="w-full max-w-sm mb-2 bg-gray-800 rounded-full h-2 overflow-hidden">
    <div id="bar" class="h-full bg-gradient-to-r from-cyan-400 to-emerald-400 rounded-full transition-all" style="width:0%"></div>
  </div>
  <!-- 画布 -->
  <div class="relative">
    <canvas id="game"></canvas>
    <!-- 游戏内遮罩 -->
    <div id="pauseOverlay" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/75 rounded-lg gap-3">
      <p id="pauseIcon" class="text-5xl"></p>
      <p id="pauseTitle" class="text-xl font-bold"></p>
      <p id="pauseSub" class="text-gray-400 text-sm"></p>
      <div class="flex gap-3">
        <button id="pauseBtn1" class="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-lg transition-all active:scale-95"></button>
        <button id="pauseBtn2" class="px-6 py-2.5 bg-gray-600 hover:bg-gray-500 text-white font-bold rounded-lg transition-all active:scale-95">返回选关</button>
      </div>
    </div>
  </div>
  <p class="mt-2 text-gray-600 text-[11px]">🎮 方向键/WASD &nbsp;|&nbsp; 空格暂停 &nbsp;|&nbsp; Esc 返回选关</p>
</div>

<!-- ========== 选关界面 ========== -->
<div id="menuUI" class="flex flex-col items-center gap-5 w-full max-w-lg px-4">
  <div class="text-center">
    <h1 class="text-4xl font-black bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">🐍 贪吃蛇</h1>
    <p class="text-gray-500 text-sm mt-1">选择关卡开始挑战</p>
  </div>
  <!-- 关卡网格 -->
  <div id="levelGrid" class="grid grid-cols-5 gap-2.5 w-full"></div>
  <!-- 底部按钮 -->
  <button id="resetSaveBtn" class="text-gray-600 hover:text-red-400 text-xs transition-colors">🗑 重置存档</button>
  <p class="text-gray-600 text-[11px]">存档自动保存到浏览器</p>
</div>

<script>
(()=>{
// ==================== DOM ====================
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const gameUI=document.getElementById('gameUI');
const menuUI=document.getElementById('menuUI');
const lvBadge=document.getElementById('lvBadge');
const scoreEl=document.getElementById('score');
const targetEl=document.getElementById('target');
const bestEl=document.getElementById('best');
const bar=document.getElementById('bar');
const pauseOverlay=document.getElementById('pauseOverlay');
const pauseIcon=document.getElementById('pauseIcon');
const pauseTitle=document.getElementById('pauseTitle');
const pauseSub=document.getElementById('pauseSub');
const pauseBtn1=document.getElementById('pauseBtn1');
const pauseBtn2=document.getElementById('pauseBtn2');
const levelGrid=document.getElementById('levelGrid');
const resetSaveBtn=document.getElementById('resetSaveBtn');

// ==================== 常量 ====================
const GRID=20, COLS=25, ROWS=25;
canvas.width=COLS*GRID; canvas.height=ROWS*GRID;
const TOTAL_LEVELS=20;

// ==================== 存档系统 ====================
const SAVE_KEY='snake_save20';
function loadSave(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(raw){const d=JSON.parse(raw);return d;}
  }catch(e){}
  // 默认：Lv1 解锁，无通关记录
  return {unlocked:1, records:{}, totalBest:0};
}
function saveGame(data){localStorage.setItem(SAVE_KEY,JSON.stringify(data))}

let save=loadSave();

// ==================== 关卡定义 ====================
function getLevelDef(lv){
  const defs=[
    {target:5, speed:150, walls:[]},
    {target:6, speed:135, walls:[]},
    {target:7, speed:125, walls:scatter(6)},
    {target:7, speed:118, walls:crossCorr()},
    {target:8, speed:112, walls:corners()},
    {target:8, speed:106, walls:hWall()},
    {target:9, speed:100, walls:ring()},
    {target:9, speed:95, walls:vBars()},
    {target:10, speed:90, walls:checker()},
    {target:10, speed:85, walls:spiral()},
    {target:11, speed:82, walls:diamond()},
    {target:11, speed:78, walls:narrow()},
    {target:12, speed:74, walls:doubleR()},
    {target:12, speed:70, walls:fence()},
    {target:13, speed:68, walls:complex()},
    {target:13, speed:64, walls:snakeCorr()},
    {target:14, speed:60, walls:starW()},
    {target:14, speed:56, walls:scatter(18)},
    {target:15, speed:52, walls:ultimate()},
    {target:20, speed:48, walls:hell()},
  ];
  return defs[Math.min(lv-1,defs.length-1)];
}

// ========== 障碍生成器（名字缩短，逻辑不变） ==========
function scatter(n){const w=[];let t=0;while(w.length<n&&t<500){t++;const x=2+Math.floor(Math.random()*(COLS-4)),y=2+Math.floor(Math.random()*(ROWS-4));if(!w.some(b=>Math.abs(b.x-x)<3&&Math.abs(b.y-y)<3))w.push({x,y})}return w}
function crossCorr(){const w=[],mx=Math.floor(COLS/2),my=Math.floor(ROWS/2);for(let i=3;i<COLS-3;i++){if(Math.abs(i-mx)>2)w.push({x:i,y:my-5})}for(let j=3;j<ROWS-3;j++){if(Math.abs(j-my)>2)w.push({x:mx-5,y:j})}return w}
function corners(){const w=[];for(let i=2;i<9;i++)for(let j=2;j<9;j++)w.push({x:i,y:j});for(let i=COLS-10;i<COLS-2;i++)for(let j=2;j<9;j++)w.push({x:i,y:j});for(let i=2;i<9;i++)for(let j=ROWS-10;j<ROWS-2;j++)w.push({x:i,y:j});for(let i=COLS-10;i<COLS-2;i++)for(let j=ROWS-10;j<ROWS-2;j++)w.push({x:i,y:j});return w}
function hWall(){const w=[],mx=Math.floor(COLS/2);for(let j=4;j<ROWS-4;j++){w.push({x:mx,j});if(Math.abs(j-Math.floor(ROWS/2))>4)w.push({x:mx+1,j})}return w}
function ring(){const w=[];for(let i=6;i<19;i++){w.push({x:i,y:6});w.push({x:i,y:18})}for(let j=7;j<18;j++){w.push({x:6,y:j});w.push({x:18,y:j})}return w}
function vBars(){const w=[];for(let i=3;i<COLS-2;i+=3)for(let j=1;j<ROWS-1;j++){if(j%5!==0)w.push({x:i,y:j})}return w}
function checker(){const w=[];for(let i=3;i<COLS-3;i+=4)for(let j=3;j<ROWS-3;j+=4)w.push({x:i,y:j},{x:i+1,y:j+1});return w}
function spiral(){const w=[];for(let r=0;r<4;r++){const l=4+r*4,R=COLS-5-r*4,t=4+r*4,b=ROWS-5-r*4;for(let i=l;i<=R;i++){if(r%2===0){w.push({x:i,y:t});w.push({x:i,y:b})}}for(let j=t;j<=b;j++){if(r%2===1){w.push({x:l,y:j});w.push({x:R,y:j})}}if(r===0){w.push({x:Math.floor(COLS/2),y:t});w.push({x:Math.floor(COLS/2),y:b})}}return w}
function diamond(){const w=[],cx=Math.floor(COLS/2),cy=Math.floor(ROWS/2);for(let i=0;i<COLS;i++)for(let j=0;j<ROWS;j++){if(Math.abs(i-cx)+Math.abs(j-cy)===7||Math.abs(i-cx)+Math.abs(j-cy)===8)w.push({x:i,y:j})}return w}
function narrow(){const w=[];for(let i=0;i<COLS;i+=7)for(let j=0;j<ROWS;j++){if(j%7!==0)w.push({x:i,y:j})}for(let j=0;j<ROWS;j+=7)for(let i=0;i<COLS;i++){if(i%7!==0)w.push({x:i,y:j})}return w}
function doubleR(){const w=[];for(let i=4;i<21;i++){w.push({x:i,y:4});w.push({x:i,y:20});w.push({x:i,y:8});w.push({x:i,y:16})}for(let j=5;j<20;j++){w.push({x:4,y:j});w.push({x:20,y:j});w.push({x:8,y:j});w.push({x:16,y:j})}return w}
function fence(){const w=[];for(let i=5;i<COLS-4;i+=5)for(let j=2;j<ROWS-1;j++)w.push({x:i,y:j});for(let j=5;j<ROWS-4;j+=5)for(let i=2;i<COLS-1;i++){if(i%5!==0)w.push({x:i,y:j})}return w}
function complex(){const w=[],mx=Math.floor(COLS/2),my=Math.floor(ROWS/2);for(let i=2;i<COLS-2;i++){if(Math.abs(i-mx)>3){w.push({x:i,y:3});w.push({x:i,y:ROWS-4})}}for(let j=4;j<ROWS-3;j++){if(Math.abs(j-my)>4){w.push({x:3,y:j});w.push({x:COLS-4,y:j})}}for(let i=6;i<COLS-5;i+=3)for(let j=6;j<ROWS-5;j+=3){if((i+j)%2===0)w.push({x:i,y:j})}return w}
function snakeCorr(){const w=[];let x=1,y=1,dx=1,dy=0,s=0,seg=5;for(let k=0;k<200;k++){const nx=x+dx*2,ny=y+dy*2;if(nx>0&&nx<COLS-1&&ny>0&&ny<ROWS-1){x=nx;y=ny;w.push({x,y})}s++;if(s>=seg){s=0;seg=seg===5?3:5;if(dx===1){dx=0;dy=1}else if(dy===1){dx=-1;dy=0}else if(dx===-1){dx=0;dy=-1}else{dx=1;dy=0}}}return w}
function starW(){const w=[],cx=Math.floor(COLS/2),cy=Math.floor(ROWS/2),r=9;for(let a=0;a<10;a+=2){const ang=Math.PI*2*a/10-Math.PI/2;for(let d=0;d<=r;d++){const sx=cx+Math.round(Math.cos(ang)*d),sy=cy+Math.round(Math.sin(ang)*d);if(sx>=0&&sx<COLS&&sy>=0&&sy<ROWS)w.push({x:sx,y:sy})}}return w}
function ultimate(){const w=[];for(let i=2;i<COLS-2;i++){w.push({x:i,y:2});w.push({x:i,y:ROWS-3})}for(let j=3;j<ROWS-2;j++){w.push({x:2,y:j});w.push({x:COLS-3,y:j})}for(let i=5;i<COLS-4;i++)for(let j=5;j<ROWS-4;j++){if((i%3===0||j%3===0)&&!(i%3===0&&j%3===0))w.push({x:i,y:j})}return w}
function hell(){let w=[];for(let i=1;i<COLS-1;i++)for(let j=1;j<ROWS-1;j++){if((i+j)%3===0&&i%2===0&&j%2===0)w.push({x:i,y:j})}for(let i=1;i<COLS-1;i++){w.push({x:i,y:1});w.push({x:i,y:ROWS-2})}for(let j=2;j<ROWS-1;j++){w.push({x:1,y:j});w.push({x:COLS-2,y:j})}return w.filter(b=>!(b.x>=10&&b.x<=14&&b.y>=10&&b.y<=14))}

// ==================== 游戏状态 ====================
let snake,food,dir,nextDir,score,targetCount,targetTotal;
let currentLv=1,currentDef,wallSet=new Set(),walls=[];
let loopId=null,running=false,paused=false,particles=[];

function spawnFood(){
  const free=[];
  for(let cx=0;cx<COLS;cx++)for(let cy=0;cy<ROWS;cy++){
    if(!wallSet.has(`${cx},${cy}`)&&!snake.some(s=>s.x===cx&&s.y===cy))free.push({x:cx,y:cy});
  }
  return free.length?free[Math.floor(Math.random()*free.length)]:null;
}

function burstAt(x,y){
  for(let i=0;i<14;i++){
    const a=Math.PI*2*i/14+Math.random()*.3,sp=1.2+Math.random()*3.5;
    particles.push({x:x*GRID+GRID/2,y:y*GRID+GRID/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:.018+Math.random()*.04,color:`hsl(${35+Math.random()*25},90%,${50+Math.random()*20}%)`});
  }
}
function updParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<=0)particles.splice(i,1)}}

function tick(){
  if(paused||!running)return;
  dir={...nextDir};
  const h=snake[0],nh={x:h.x+dir.x,y:h.y+dir.y};
  if(nh.x<0||nh.x>=COLS||nh.y<0||nh.y>=ROWS)return endGame(false,'撞墙了！');
  if(wallSet.has(`${nh.x},${nh.y}`))return endGame(false,'撞到障碍物！');
  const eat=food&&nh.x===food.x&&nh.y===food.y;
  const body=eat?snake:snake.slice(0,-1);
  if(body.some(s=>s.x===nh.x&&s.y===nh.y))return endGame(false,'咬到自己了！');
  snake.unshift(nh);
  if(eat){
    score+=10;targetCount++;scoreEl.textContent=score;targetEl.textContent=`${targetCount}/${targetTotal}`;
    bar.style.width=(targetCount/targetTotal*100)+'%';
    burstAt(food.x,food.y);
    if(targetCount>=targetTotal)return endGame(true,'');
    food=spawnFood();if(!food)return endGame(false,'无处可去！');
  }else{snake.pop();}
  updParticles();
}

function restartTimer(){clearInterval(loopId);loopId=setInterval(tick,currentDef.speed)}

// ==================== 游戏结束 ====================
function endGame(won,reason){
  running=false;clearInterval(loopId);
  const prev=save.records[currentLv]||0;
  const isNewBest=score>prev;
  if(isNewBest){save.records[currentLv]=score}
  // 计算总分
  let total=0;for(const k in save.records)total+=save.records[k];
  if(total>save.totalBest)save.totalBest=total;

  if(won){
    // 解锁下一关
    if(currentLv>=save.unlocked&&currentLv<TOTAL_LEVELS)save.unlocked=currentLv+1;
    saveGame(save);
    const star=score>=targetTotal*9?'⭐⭐⭐':score>=targetTotal*6?'⭐⭐':'⭐';
    showPause('🏆','通关成功！',`得分：${score} ${star}${isNewBest?' 🆕新纪录！':''}`,'再来一次','返回选关');
  }else{
    saveGame(save);
    showPause('💀',reason,`得分：${score}${isNewBest?' 🆕新纪录！':''}`,'重试','返回选关');
  }
}

function showPause(icon,title,sub,btn1,btn2){
  pauseIcon.textContent=icon;pauseTitle.textContent=title;pauseSub.textContent=sub;
  pauseBtn1.textContent=btn1;pauseBtn2.textContent=btn2;
  pauseOverlay.classList.remove('hidden');
}
function hidePause(){pauseOverlay.classList.add('hidden')}

// ==================== 开始/停止关卡 ====================
function startLevel(lv){
  currentLv=lv;
  currentDef=getLevelDef(lv);
  walls=currentDef.walls;wallSet=new Set(walls.map(w=>`${w.x},${w.y}`));
  targetTotal=currentDef.target;targetCount=0;score=0;particles=[];
  scoreEl.textContent='0';targetEl.textContent=`0/${targetTotal}`;
  lvBadge.textContent=lv;bar.style.width='0%';
  const prev=save.records[lv];
  bestEl.textContent=prev?`${prev}`:'-';

  // 出生点
  const mx=Math.floor(COLS/2),my=Math.floor(ROWS/2);
  snake=[{x:mx,y:my},{x:mx-1,y:my},{x:mx-2,y:my}];
  if(snake.some(s=>wallSet.has(`${s.x},${s.y}`))){
    for(let cy=my;cy<ROWS;cy++)for(let cx=mx;cx<COLS;cx++){
      if(!wallSet.has(`${cx},${cy}`)&&!wallSet.has(`${cx-1},${cy}`)&&!wallSet.has(`${cx-2},${cy}`)){
        snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];cy=ROWS;break;
      }
    }
  }
  dir={x:1,y:0};nextDir={x:1,y:0};
  food=spawnFood();
  hidePause();menuUI.classList.add('hidden');gameUI.classList.remove('hidden');
  running=true;paused=false;
  clearInterval(loopId);loopId=setInterval(tick,currentDef.speed);
}

function backToMenu(){
  running=false;clearInterval(loopId);
  hidePause();gameUI.classList.add('hidden');menuUI.classList.remove('hidden');
  renderLevelGrid();
}

// ==================== 选关界面 ====================
function renderLevelGrid(){
  levelGrid.innerHTML='';
  for(let lv=1;lv<=TOTAL_LEVELS;lv++){
    const unlocked=lv<=save.unlocked;
    const record=save.records[lv];
    const completed=!!record;
    const isCurrent=lv===save.unlocked&&lv<=TOTAL_LEVELS;

    const btn=document.createElement('button');
    btn.className='lv-btn relative w-full aspect-square rounded-xl font-bold text-lg flex flex-col items-center justify-center border-2 ';
    if(unlocked){
      btn.classList.add('border-emerald-600','bg-gray-800','hover:bg-gray-700','cursor-pointer');
    }else{
      btn.classList.add('border-gray-700','bg-gray-900','cursor-not-allowed','opacity-40');
    }
    if(isCurrent&&!completed)btn.classList.add('ring-2','ring-cyan-400','ring-offset-2','ring-offset-gray-950');

    btn.innerHTML=`
      <span class="${unlocked?'text-white':'text-gray-600'}">${lv}</span>
      ${completed?`<span class="text-yellow-400 text-[10px] leading-none mt-0.5">⭐</span>`:''}
      ${!unlocked?`<span class="text-gray-600 text-xs">🔒</span>`:''}
      ${isCurrent&&!completed?`<span class="absolute -top-1.5 -right-1.5 w-2.5 h-2.5 bg-cyan-400 rounded-full"></span>`:''}
    `;

    if(unlocked)btn.onclick=()=>startLevel(lv);
    levelGrid.appendChild(btn);
  }
}

resetSaveBtn.onclick=()=>{
  if(confirm('确定要清除所有存档吗？此操作不可恢复！')){
    save={unlocked:1,records:{},totalBest:0};
    saveGame(save);renderLevelGrid();
  }
};

// ==================== 暂停按钮事件 ====================
pauseBtn1.onclick=()=>{
  if(paused){paused=false;hidePause();return}
  // 重试/再来一次
  hidePause();startLevel(currentLv);
};
pauseBtn2.onclick=()=>backToMenu();

// ==================== 键盘 ====================
window.addEventListener('keydown',e=>{
  if(gameUI.classList.contains('hidden'))return;
  if(!running)return;
  if(e.code==='Space'){e.preventDefault();paused=!paused;paused?showPause('⏸','暂停中','按空格继续','继续','返回选关'):hidePause();return;}
  if(e.code==='Escape'){e.preventDefault();backToMenu();return;}
  if(paused)return;
  const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},KeyW:{x:0,y:-1},KeyS:{x:0,y:1},KeyA:{x:-1,y:0},KeyD:{x:1,y:0}};
  const nd=m[e.code];if(!nd)return;e.preventDefault();
  if(nd.x===-dir.x&&nd.y===-dir.y)return;
  nextDir=nd;
});

// ==================== 触摸 ====================
let tsX=0,tsY=0;
canvas.addEventListener('touchstart',e=>{e.preventDefault();tsX=e.touches[0].clientX;tsY=e.touches[0].clientY},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(!running||paused)return;
  const dx=e.changedTouches[0].clientX-tsX,dy=e.changedTouches[0].clientY-tsY;
  if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
  let nd;if(Math.abs(dx)>Math.abs(dy)){nd={x:dx>0?1:-1,y:0}}else{nd={x:0,y:dy>0?1:-1}}
  if(nd.x===-dir.x&&nd.y===-dir.y)return;
  nextDir=nd;
});

// ==================== 渲染 ====================
function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#1e293b';ctx.lineWidth=.4;
  for(let cx=0;cx<=COLS;cx++){ctx.beginPath();ctx.moveTo(cx*GRID,0);ctx.lineTo(cx*GRID,ROWS*GRID);ctx.stroke()}
  for(let cy=0;cy<=ROWS;cy++){ctx.beginPath();ctx.moveTo(0,cy*GRID);ctx.lineTo(COLS*GRID,cy*GRID);ctx.stroke()}

  // 障碍
  walls.forEach(w=>{
    const bx=w.x*GRID,by=w.y*GRID;
    ctx.fillStyle='#374151';ctx.fillRect(bx+1,by+1,GRID-2,GRID-2);
    ctx.fillStyle='#4b5563';ctx.fillRect(bx+1,by+1,GRID-4,GRID-4);
    ctx.strokeStyle='#1f2937';ctx.lineWidth=1;ctx.strokeRect(bx+1.5,by+1.5,GRID-3,GRID-3);
  });

  // 食物
  if(food){
    const t=Date.now()/200,pulse=1+.15*Math.sin(t),r=(GRID/2-2)*pulse,fx=food.x*GRID+GRID/2,fy=food.y*GRID+GRID/2;
    const g=ctx.createRadialGradient(fx,fy,r*.2,fx,fy,r*2);
    g.addColorStop(0,'rgba(251,191,36,.8)');g.addColorStop(1,'rgba(251,191,36,0)');
    ctx.fillStyle=g;ctx.fillRect(food.x*GRID-GRID,food.y*GRID-GRID,GRID*3,GRID*3);
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(fx,fy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.beginPath();ctx.arc(fx-r*.2,fy-r*.2,r*.3,0,Math.PI*2);ctx.fill();
  }

  // 蛇
  snake.forEach((seg,i)=>{
    const sx=seg.x*GRID,sy=seg.y*GRID,t=i/Math.max(snake.length-1,1);
    if(i===0){
      ctx.fillStyle='#10b981';ctx.shadowColor='#34d399';ctx.shadowBlur=10;
      roundR(sx+1.5,sy+1.5,GRID-3,GRID-3,7);ctx.fill();ctx.shadowBlur=0;
      const er=3.2,m=GRID/2;let e1=[],e2=[];
      if(dir.x===1){e1=[sx+m+2.5,sy+m-4];e2=[sx+m+2.5,sy+m+4]}
      if(dir.x===-1){e1=[sx+m-2.5,sy+m-4];e2=[sx+m-2.5,sy+m+4]}
      if(dir.y===1){e1=[sx+m-4,sy+m+2.5];e2=[sx+m+4,sy+m+2.5]}
      if(dir.y===-1){e1=[sx+m-4,sy+m-2.5];e2=[sx+m+4,sy+m-2.5]}
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(e1[0],e1[1],er,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(e2[0],e2[1],er,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#0f172a';ctx.beginPath();ctx.arc(e1[0],e1[1],1.6,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(e2[0],e2[1],1.6,0,Math.PI*2);ctx.fill();
    }else{
      const g=Math.round(160-t*105),r=Math.round(16+t*25),b=Math.round(130-t*85);
      ctx.fillStyle=`rgb(${r},${g},${b})`;roundR(sx+1.5,sy+1.5,GRID-3,GRID-3,5);ctx.fill();
    }
  });

  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,3.5*p.life,0,Math.PI*2);ctx.fill()});
  ctx.globalAlpha=1;

  // 水印
  ctx.fillStyle='rgba(255,255,255,.03)';ctx.font='bold 80px system-ui';ctx.textAlign='center';
  ctx.fillText(`Lv.${currentLv}`,canvas.width/2,canvas.height/2+25);

  requestAnimationFrame(draw);
}

function roundR(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

// ==================== 启动 ====================
renderLevelGrid();draw();
})();
</script>
</body>

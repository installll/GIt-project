<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 贪吃蛇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { overflow: hidden; touch-action: none; }
        canvas { display: block; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col items-center justify-center">

    <!-- 顶部信息栏 -->
    <div class="flex items-center gap-6 mb-4">
        <div class="text-center">
            <p class="text-gray-400 text-xs uppercase tracking-wider">得分</p>
            <p id="score" class="text-3xl font-bold text-emerald-400 tabular-nums">0</p>
        </div>
        <div class="text-center">
            <p class="text-gray-400 text-xs uppercase tracking-wider">最高分</p>
            <p id="highScore" class="text-xl font-bold text-gray-500 tabular-nums">0</p>
        </div>
    </div>

    <!-- 游戏画布 -->
    <div class="relative">
        <canvas id="game"></canvas>
        <!-- 遮罩层 -->
        <div id="overlay"
             class="absolute inset-0 flex flex-col items-center justify-center
                    bg-black/70 rounded-lg hidden gap-4">
            <p id="overlayTitle" class="text-2xl font-bold"></p>
            <p id="overlaySub" class="text-gray-400 text-sm"></p>
            <button id="overlayBtn"
                    class="px-8 py-3 bg-emerald-600 hover:bg-emerald-500 text-white
                           font-bold rounded-lg transition-all active:scale-95">
            </button>
        </div>
    </div>

    <!-- 操作提示 -->
    <p class="mt-4 text-gray-600 text-xs">
        🎮 方向键 / WASD 控制移动 &nbsp;|&nbsp; 空格键暂停
    </p>

    <script>
    (() => {
        // ==================== DOM ====================
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlaySub = document.getElementById('overlaySub');
        const overlayBtn = document.getElementById('overlayBtn');

        // ==================== 游戏参数 ====================
        const GRID = 20;         // 格子大小 (px)
        const COLS = 25;         // 列数
        const ROWS = 25;         // 行数
        const SPEED_BASE = 120;  // 基础速度 (ms/帧), 越小越快
        const SPEED_MIN  = 50;   // 最快速度

        canvas.width  = COLS * GRID;
        canvas.height = ROWS * GRID;

        // ==================== 状态变量 ====================
        let snake = [];          // [{x, y}, ...]  头在前
        let food = null;         // {x, y}
        let dir = { x: 1, y: 0 };
        let nextDir = { x: 1, y: 0 };
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snake_high') || '0');
        let gameLoopId = null;
        let running = false;
        let paused = false;
        let speed = SPEED_BASE;
        let particles = [];      // 吃到食物时的粒子特效

        highScoreEl.textContent = highScore;

        // ==================== 食物生成 ====================
        function spawnFood() {
            const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
            const free = [];
            for (let cx = 0; cx < COLS; cx++) {
                for (let cy = 0; cy < ROWS; cy++) {
                    if (!occupied.has(`${cx},${cy}`)) free.push({ x: cx, y: cy });
                }
            }
            if (free.length === 0) return null; // 赢了
            return free[Math.floor(Math.random() * free.length)];
        }

        // ==================== 粒子特效 ====================
        function burstAt(x, y) {
            for (let i = 0; i < 12; i++) {
                const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.4;
                const spd = 1 + Math.random() * 3;
                particles.push({
                    x: x * GRID + GRID / 2,
                    y: y * GRID + GRID / 2,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd,
                    life: 1,
                    decay: 0.02 + Math.random() * 0.04,
                    color: `hsl(${40 + Math.random() * 30}, 90%, 55%)`,
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        // ==================== 游戏逻辑 ====================
        function tick() {
            if (paused) return;

            // 应用方向
            dir = { ...nextDir };

            // 计算新头部
            const head = snake[0];
            const newHead = { x: head.x + dir.x, y: head.y + dir.y };

            // 碰墙检测
            if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
                return gameOver();
            }

            // 碰自己检测（排除尾部，因为尾部即将移走——除非吃到食物）
            const willEat = food && newHead.x === food.x && newHead.y === food.y;
            const checkBody = willEat ? snake : snake.slice(0, -1);
            if (checkBody.some(s => s.x === newHead.x && s.y === newHead.y)) {
                return gameOver();
            }

            // 移动
            snake.unshift(newHead);

            if (willEat) {
                // 不删尾 → 增长
                score += 10;
                scoreEl.textContent = score;
                burstAt(food.x, food.y);
                food = spawnFood();
                if (!food) return winGame();
                // 加速
                speed = Math.max(SPEED_MIN, SPEED_BASE - Math.floor(score / 50) * 5);
                restartTimer();
            } else {
                snake.pop();
            }

            // 更新速度（响应 score 变化）
            updateParticles();
        }

        function restartTimer() {
            clearInterval(gameLoopId);
            gameLoopId = setInterval(tick, speed);
        }

        // ==================== 渲染 ====================
        function draw() {
            // 背景
            ctx.fillStyle = '#111827';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 网格线
            ctx.strokeStyle = '#1f2937';
            ctx.lineWidth = 0.5;
            for (let cx = 0; cx <= COLS; cx++) {
                ctx.beginPath();
                ctx.moveTo(cx * GRID, 0);
                ctx.lineTo(cx * GRID, ROWS * GRID);
                ctx.stroke();
            }
            for (let cy = 0; cy <= ROWS; cy++) {
                ctx.beginPath();
                ctx.moveTo(0, cy * GRID);
                ctx.lineTo(COLS * GRID, cy * GRID);
                ctx.stroke();
            }

            // 食物（带脉冲动画）
            if (food) {
                const pulse = 1 + 0.15 * Math.sin(Date.now() / 200);
                const r = (GRID / 2 - 2) * pulse;
                const cx = food.x * GRID + GRID / 2;
                const cy = food.y * GRID + GRID / 2;

                // 光晕
                const glow = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r * 1.8);
                glow.addColorStop(0, 'rgba(239, 68, 68, 0.7)');
                glow.addColorStop(1, 'rgba(239, 68, 68, 0)');
                ctx.fillStyle = glow;
                ctx.fillRect(food.x * GRID - GRID, food.y * GRID - GRID, GRID * 3, GRID * 3);

                // 果实
                ctx.fillStyle = '#ef4444';
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(cx - r * 0.25, cy - r * 0.25, r * 0.35, 0, Math.PI * 2);
                ctx.fill();
            }

            // 蛇身
            snake.forEach((seg, i) => {
                const sx = seg.x * GRID, sy = seg.y * GRID;
                const t = i / Math.max(snake.length - 1, 1); // 0(头) ~ 1(尾)

                if (i === 0) {
                    // 头部
                    ctx.fillStyle = '#10b981';
                    ctx.shadowColor = '#34d399';
                    ctx.shadowBlur = 8;
                    roundRect(sx + 2, sy + 2, GRID - 4, GRID - 4, 6);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // 眼睛
                    const eyeR = 3;
                    let ex1, ey1, ex2, ey2;
                    const m = GRID / 2;
                    if (dir.x === 1)  { ex1 = sx+m+2; ey1 = sy+m-4; ex2 = sx+m+2; ey2 = sy+m+4; }
                    if (dir.x === -1) { ex1 = sx+m-2; ey1 = sy+m-4; ex2 = sx+m-2; ey2 = sy+m+4; }
                    if (dir.y === 1)  { ex1 = sx+m-4; ey1 = sy+m+2; ex2 = sx+m+4; ey2 = sy+m+2; }
                    if (dir.y === -1) { ex1 = sx+m-4; ey1 = sy+m-2; ex2 = sx+m+4; ey2 = sy+m-2; }
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(ex1, ey1, eyeR, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(ex2, ey2, eyeR, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#111';
                    ctx.beginPath(); ctx.arc(ex1, ey1, 1.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(ex2, ey2, 1.5, 0, Math.PI*2); ctx.fill();
                } else {
                    // 身体：从翠绿渐变到墨绿
                    const g = Math.round(160 - t * 100);
                    const r = Math.round(16  + t * 20);
                    const b = Math.round(130 - t * 80);
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    roundRect(sx + 1.5, sy + 1.5, GRID - 3, GRID - 3, 5);
                    ctx.fill();
                }
            });

            // 粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            requestAnimationFrame(draw);
        }

        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // ==================== 结束 / 胜利 ====================
        function gameOver() {
            running = false;
            clearInterval(gameLoopId);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snake_high', highScore);
                highScoreEl.textContent = highScore;
            }
            showOverlay('💀 游戏结束', `最终得分：${score}`, '再来一局');
        }

        function winGame() {
            running = false;
            clearInterval(gameLoopId);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snake_high', highScore);
                highScoreEl.textContent = highScore;
            }
            showOverlay('🎉 恭喜通关！', `满分：${score}`, '再来一局');
        }

        function showOverlay(title, sub, btn) {
            overlayTitle.textContent = title;
            overlaySub.textContent = sub;
            overlayBtn.textContent = btn;
            overlay.classList.remove('hidden');
        }

        function hideOverlay() {
            overlay.classList.add('hidden');
        }

        // ==================== 初始化 / 重置 ====================
        function init() {
            const midX = Math.floor(COLS / 2);
            const midY = Math.floor(ROWS / 2);
            snake = [
                { x: midX,     y: midY },
                { x: midX - 1, y: midY },
                { x: midX - 2, y: midY },
            ];
            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            score = 0;
            speed = SPEED_BASE;
            particles = [];
            scoreEl.textContent = '0';
            food = spawnFood();
            hideOverlay();
            running = true;
            paused = false;
            clearInterval(gameLoopId);
            gameLoopId = setInterval(tick, speed);
        }

        // ==================== 事件监听 ====================
        window.addEventListener('keydown', e => {
            if (!running) return;

            // 空格暂停/继续
            if (e.code === 'Space') {
                e.preventDefault();
                paused = !paused;
                if (paused) {
                    showOverlay('⏸ 暂停中', '按空格键或点击按钮继续', '继续');
                } else {
                    hideOverlay();
                }
                return;
            }

            if (paused) return;

            const keyMap = {
                ArrowUp:    { x: 0,  y: -1 },
                ArrowDown:  { x: 0,  y: 1  },
                ArrowLeft:  { x: -1, y: 0  },
                ArrowRight: { x: 1,  y: 0  },
                KeyW: { x: 0,  y: -1 },
                KeyS: { x: 0,  y: 1  },
                KeyA: { x: -1, y: 0  },
                KeyD: { x: 1,  y: 0  },
            };

            const newDir = keyMap[e.code];
            if (!newDir) return;
            e.preventDefault();

            // 不允许反向（不能 180° 掉头）
            if (newDir.x === -dir.x && newDir.y === -dir.y) return;

            nextDir = newDir;
        });

        // 覆盖层按钮
        overlayBtn.addEventListener('click', () => {
            if (paused) {
                paused = false;
                hideOverlay();
            } else {
                init();
            }
        });

        // 移动端滑动手势
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            if (!running || paused) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx), absDy = Math.abs(dy);

            if (absDx < 20 && absDy < 20) return; // 忽略轻触

            let newDir;
            if (absDx > absDy) {
                newDir = { x: dx > 0 ? 1 : -1, y: 0 };
            } else {
                newDir = { x: 0, y: dy > 0 ? 1 : -1 };
            }

            if (newDir.x === -dir.x && newDir.y === -dir.y) return;
            nextDir = newDir;
        });

        // ==================== 启动 ====================
        init();
        draw();
    })();
    </script>
</body>
</html>
